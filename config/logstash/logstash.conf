input {
  beats {
    port => 5044
  }
}

filter {
  grok {
    match => { "message" => "Failed password for %{WORD:user} from %{IP:source.ip}" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "filebeat-%{+YYYY.MM.dd}"
  }

  stdout { codec => rubydebug }
}